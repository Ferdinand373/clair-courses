<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6f4ed">
  <title>Clair Courses</title>
  <style>
    html,body{
      min-height:100%;
      margin:0;
      background:#f6f4ed;
      color:#203128;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif
    }
    .loading{
      display:grid;
      min-height:100vh;
      place-items:center;
      padding:24px;
      text-align:center
    }
    .loading strong{font-size:1.35rem}
    .loading p{color:#66736b;line-height:1.45}
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div>
      <strong>Clair Courses</strong>
      <p>Ouverture de votre liste…</p>
    </div>
  </div>

  <script>
  (async()=>{
    const commit="eb4e3ee8db453dc0983606251bac5943a085e44b";
    const shellCacheKey="clairCourses.shell.v10.3";
    const sources=[
      `https://cdn.jsdelivr.net/gh/Ferdinand373/clair-courses@${commit}/index.html`,
      `https://raw.githubusercontent.com/Ferdinand373/clair-courses/${commit}/index.html`
    ];

    let html="";
    for(const source of sources){
      try{
        const response=await fetch(source,{cache:"no-store"});
        if(response.ok){
          html=await response.text();
          try{localStorage.setItem(shellCacheKey,html)}catch(error){}
          break;
        }
      }catch(error){}
    }

    if(!html){
      try{html=localStorage.getItem(shellCacheKey)||""}catch(error){}
    }

    if(!html){
      document.getElementById("loading").innerHTML=
        '<div><strong>Clair Courses ne peut pas s’ouvrir.</strong>'+
        '<p>Vérifiez la connexion puis rechargez la page.</p>'+
        '<button onclick="location.reload()" style="min-height:48px;padding:0 18px;border:0;border-radius:13px;color:white;background:#2f6b4f;font-weight:800">Réessayer</button></div>';
      return;
    }

    html=html
      .replace('const APP_VERSION=904;','const APP_VERSION=1003;')
      .replace('const APP_RELEASE="9.4";','const APP_RELEASE="10.3";')
      .replaceAll('V9.4','V10.3')
      .replaceAll('Version 9.4','Version 10.3');

    // Deux rayons voisins : d’abord les légumes, puis les fruits.
    html=html
      .replace(
        'const AISLES=["Eau","Épicerie","Fruits et légumes","Boucherie","Charcuterie","Poissonnerie","Boulangerie","Conserves","Crèmerie","Surgelés","Boissons","Hygiène","Maison","Divers"];',
        'const AISLES=["Eau","Épicerie","Légumes","Fruits","Boucherie","Charcuterie","Poissonnerie","Boulangerie","Conserves","Crèmerie","Surgelés","Boissons","Hygiène","Maison","Divers"];'
      )
      .replace(
        'const CLASSIFICATION_ORDER=["Eau","Charcuterie","Conserves","Surgelés","Boissons","Poissonnerie","Boucherie","Crèmerie","Boulangerie","Épicerie","Fruits et légumes","Hygiène","Maison"];',
        'const CLASSIFICATION_ORDER=["Eau","Charcuterie","Conserves","Surgelés","Boissons","Poissonnerie","Boucherie","Crèmerie","Boulangerie","Épicerie","Légumes","Fruits","Hygiène","Maison"];'
      )
      .replace(
        '  "Fruits et légumes":["pdt","patate","patates","abricot","ail","ananas","aubergine","avocat","banane","betterave","brocoli","carotte","céleri","champignon","chou","citron","clémentine","concombre","courgette","échalote","épinard","fraise","framboise","haricot vert","kiwi","mâche","mandarine","melon","navet","oignon","orange","pamplemousse","poire","poireau","poivron","pomme","pomme de terre","raisin","salade","tomate"],',
        '  "Légumes":["pdt","patate","patates","ail","aubergine","betterave","brocoli","carotte","céleri","champignon","chou","concombre","courgette","échalote","épinard","haricot vert","mâche","navet","oignon","poireau","poivron","pomme de terre","salade","tomate"],\n  "Fruits":["abricot","ananas","avocat","banane","cerise","citron","clémentine","fraise","framboise","kiwi","mandarine","mangue","melon","nectarine","orange","pamplemousse","pastèque","pêche","poire","pomme","prune","raisin"],'
      )
      .replace(
        '  "fruits legumes":"Fruits et légumes","fruits et legumes":"Fruits et légumes","legumes":"Fruits et légumes",',
        '  "fruits legumes":"Fruits et légumes","fruits et legumes":"Fruits et légumes","legumes":"Légumes","fruits":"Fruits",'
      );

    html=html.replace('</style>',`
      .empty-state{display:none!important}
      .products-panel>summary span:first-child{line-height:1.25}
      .choice-copy{margin:-4px 0 0;color:var(--muted);font-size:.9rem;line-height:1.4}
      .choice-list{display:grid;gap:9px}
      .choice-button{min-height:54px;padding:10px 14px;border:1px solid var(--line);border-radius:14px;color:var(--text);background:#fff;text-align:left;font-weight:900}
      .choice-button small{display:block;margin-top:3px;color:var(--muted);font-size:.78rem;font-weight:600}
      .choice-button.primary-choice{border-color:#b8cfbf;background:var(--accentSoft);color:var(--accent2)}
      .condition-hint{font-weight:600}
      .product-add{position:relative;padding-left:56px}
      .product-add:before{
        content:"+";
        position:absolute;
        left:12px;
        top:50%;
        width:32px;
        height:32px;
        display:grid;
        place-items:center;
        transform:translateY(-50%);
        border-radius:999px;
        color:#fff;
        background:var(--accent);
        font-size:1.35rem;
        font-weight:950;
        line-height:1
      }
      .product-add.is-present{
        border-color:#b7cfbe;
        color:var(--accent2);
        background:var(--accentSoft)
      }
      .product-add.is-present:before{
        content:"✓";
        background:var(--accent2);
        font-size:1.05rem
      }
      .action.has-items{
        color:#fff;
        background:var(--accent)
      }
    </style>`);

    html=html.replace('</body>',`
      <dialog id="choice-dialog">
        <div class="dialog-card">
          <div class="dialog-header">
            <h2 id="choice-title">Choisir le conditionnement</h2>
            <button class="close-button" id="choice-close" type="button" aria-label="Fermer">×</button>
          </div>
          <p class="choice-copy">Touchez simplement la présentation disponible en magasin.</p>
          <div class="choice-list" id="choice-list"></div>
        </div>
      </dialog>

      <script>
      (()=>{        
        const productSummary=document.querySelector('#products-panel > summary > span:first-child');
        if(productSummary){
          const count=productSummary.querySelector('small');
          productSummary.textContent='Ajouter depuis mes produits ';
          if(count)productSummary.append(count);
        }

        let listNavButton=null;
        const oldButton=document.getElementById('bar-add');
        if(oldButton){
          listNavButton=oldButton.cloneNode(true);
          const icon=listNavButton.querySelector('.action-icon');
          const labels=listNavButton.querySelectorAll('span');

          if(icon)icon.textContent='📋';
          if(labels.length>1)labels[labels.length-1].textContent='Liste';

          oldButton.replaceWith(listNavButton);
          listNavButton.addEventListener('click',()=>{
            document.getElementById('list-title')?.scrollIntoView({
              behavior:'smooth',
              block:'start'
            });
          });
        }

        function goToList(){
          document.getElementById('list-title')?.scrollIntoView({
            behavior:'smooth',
            block:'start'
          });
        }

        function updateListNav(){
          if(!listNavButton)return;
          const labels=listNavButton.querySelectorAll('span');
          const label=labels.length>1?labels[labels.length-1]:null;
          const count=state.items.length;
          if(label)label.textContent=count?('Liste ('+count+')'):'Liste';
          listNavButton.classList.toggle('has-items',count>0);
          listNavButton.classList.remove('primary');
        }

        const quantityField=document.getElementById('product-quantity');
        if(quantityField){
          quantityField.placeholder='Ex. à l’unité | filet de 4/5';
          const label=quantityField.closest('label');
          if(label){
            const hint=label.querySelector('.label-hint');
            for(const node of Array.from(label.childNodes)){
              if(node.nodeType===Node.TEXT_NODE && node.textContent.trim()){
                node.textContent='Conditionnement(s)';
                break;
              }
            }
            if(hint){
              hint.textContent='Un choix, ou plusieurs séparés par |. Exemple : à l’unité | filet de 4/5.';
              hint.classList.add('condition-hint');
            }
          }
        }

        const choiceDialog=document.getElementById('choice-dialog');
        const choiceTitle=document.getElementById('choice-title');
        const choiceList=document.getElementById('choice-list');
        const choiceClose=document.getElementById('choice-close');
        let pendingProduct=null;

        function productChoices(product){
          const raw=clean(product && product.quantity,80);
          if(!raw)return [];
          return raw.split(/\s*[|;]\s*/).map(value=>clean(value,80)).filter(Boolean);
        }

        function addChosenProduct(product,quantity){
          if(itemExists(product)){
            showToast(product.name+' est déjà dans la liste.','Voir la liste',goToList);
            return;
          }
          addOrMergeItem({name:product.name,quantity:quantity,aisle:product.aisle});
          closeDialog(choiceDialog);
          commit();
          showToast(product.name+' ajouté à la liste.','Voir la liste',goToList);
          pendingProduct=null;
        }

        function openChoiceDialog(product,choices){
          pendingProduct=product;
          choiceTitle.textContent=product.name;
          choiceList.innerHTML='';
          choices.forEach((choice,index)=>{
            const button=document.createElement('button');
            button.type='button';
            button.className='choice-button'+(index===0?' primary-choice':'');
            const strong=document.createElement('strong');
            strong.textContent=choice;
            const small=document.createElement('small');
            small.textContent='Ajouter à la liste';
            button.append(strong,small);
            button.addEventListener('click',()=>addChosenProduct(product,choice));
            choiceList.append(button);
          });
          openDialog(choiceDialog);
        }

        // Pour l’ail, l’unité minimale d’achat est une tête, jamais une gousse.
        QUANTITY_UNIT_ALIASES["tete"]={kind:"count",factor:1,unit:"tête"};
        QUANTITY_UNIT_ALIASES["tetes"]={kind:"count",factor:1,unit:"tête"};
        COUNT_LABELS["tête"]=["tête","têtes"];

        function numberIn(value){
          const match=String(value||"").match(/\d+(?:[.,]\d+)?/);
          return match?decimal(match[0]):null;
        }

        function normalizeGarlicEntry(entry){
          if(!entry)return entry;
          const copy={...entry};
          const name=normalize(copy.name||"");
          const quantity=normalize(copy.quantity||"");
          const plainGarlic=name==="ail"||name==="ail frais";
          const cloveName=/^gousses? d ail$/.test(name);
          const headName=/^tetes? d ail$/.test(name);

          if(!plainGarlic&&!cloveName&&!headName)return copy;

          copy.name="Ail";

          if(cloveName||/\bgousses?\b/.test(quantity)){
            copy.quantity="1 tête";
            return copy;
          }

          if(headName||/\btetes?\b/.test(quantity)){
            const count=numberIn(copy.quantity)||numberIn(copy.name)||1;
            copy.quantity=formatQuantity({kind:"count",unit:"tête",base:count});
            return copy;
          }

          const count=numberIn(copy.quantity);
          copy.quantity=count
            ? formatQuantity({kind:"count",unit:"tête",base:Math.max(1,count)})
            : "1 tête";
          return copy;
        }

        function normalizeGarlicState(){
          state.items=consolidateItems(state.items.map(normalizeGarlicEntry));
          state.products=uniqueProducts(state.products.map(normalizeGarlicEntry));
        }

        const baseAddOrMergeItem=addOrMergeItem;
        addOrMergeItem=function(entry){
          return baseAddOrMergeItem(normalizeGarlicEntry(entry));
        };

        const baseCommit=commit;
        commit=function(message){
          normalizeGarlicState();
          baseCommit(message);
        };

        addProductToList=function(product){
          const choices=productChoices(product);

          if(itemExists(product)){
            showToast(product.name+' est déjà dans la liste.','Voir la liste',goToList);
            return;
          }

          if(choices.length>1){
            openChoiceDialog(product,choices);
            return;
          }

          addOrMergeItem({
            name:product.name,
            quantity:choices.length===1?choices[0]:product.quantity,
            aisle:product.aisle
          });
          commit();
          showToast(product.name+' ajouté à la liste.','Voir la liste',goToList);
        };

        function decorateProducts(){
          const buttons=Array.from(document.querySelectorAll('#products-list .product-add'));
          buttons.forEach(button=>{
            const name=button.querySelector('strong')?.textContent||'';
            const product=state.products.find(entry=>entry.name===name);
            if(!product)return;

            const small=button.querySelector('small');
            const present=itemExists(product);
            const choices=productChoices(product);

            button.classList.toggle('is-present',present);

            if(small){
              if(present){
                small.textContent='✓ Dans la liste · '+product.aisle;
              }else if(choices.length>1){
                small.textContent='Touchez pour choisir · '+product.aisle;
              }else{
                small.textContent='Touchez pour ajouter · '+product.aisle;
              }
            }
          });
          updateListNav();
        }

        const originalRender=render;
        render=function(){
          originalRender();
          decorateProducts();
        };

        const migrationKey='clairCourses.v10.conditionnements';
        try{
          if(!localStorage.getItem(migrationKey)){
            const courgette=state.products.find(product=>productKey(product.name)==='courgette');
            if(courgette && !clean(courgette.quantity,80)){
              courgette.quantity='à l’unité | filet de 4/5';
            }
            localStorage.setItem(migrationKey,'1');
          }
        }catch(error){}

        normalizeGarlicState();
        save();
        render();
        updateListNav();

        choiceClose.addEventListener('click',()=>closeDialog(choiceDialog));
        choiceDialog.addEventListener('click',event=>{
          if(event.target===choiceDialog)closeDialog(choiceDialog);
        });

        decorateProducts();
      })();
      <\/script>
    </body>`);

    document.open();
    document.write(html);
    document.close();
  })();
  </script>
</body>
</html>
