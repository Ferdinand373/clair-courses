<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6f4ed">
  <title>Clair Courses</title>
  <style>
    html,body{min-height:100%;margin:0;background:#f6f4ed;color:#203128;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .loading{display:grid;min-height:100vh;place-items:center;padding:24px;text-align:center}
    .loading strong{font-size:1.35rem}
    .loading p{color:#66736b;line-height:1.45}
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div><strong>Clair Courses</strong><p>Ouverture de votre liste…</p></div>
  </div>

  <script>
  (async()=>{
    const commit="a538de479e6fe7907d62890526c3c13d27359a04";
    const shellCacheKey="clairCourses.shell.v10.7";
    const sources=[
      `https://cdn.jsdelivr.net/gh/Ferdinand373/clair-courses@${commit}/index.html`,
      `https://raw.githubusercontent.com/Ferdinand373/clair-courses/${commit}/index.html`
    ];

    let source="";
    for(const url of sources){
      try{
        const response=await fetch(url,{cache:"no-store"});
        if(response.ok){
          source=await response.text();
          try{localStorage.setItem(shellCacheKey,source)}catch(error){}
          break;
        }
      }catch(error){}
    }

    if(!source){
      try{source=localStorage.getItem(shellCacheKey)||""}catch(error){}
    }

    if(!source){
      document.getElementById("loading").innerHTML=
        '<div><strong>Clair Courses ne peut pas s’ouvrir.</strong>'+
        '<p>Vérifiez la connexion puis rechargez la page.</p>'+
        '<button onclick="location.reload()" style="min-height:48px;padding:0 18px;border:0;border-radius:13px;color:white;background:#2f6b4f;font-weight:800">Réessayer</button></div>';
      return;
    }

    source=source
      .replaceAll('shell.v10.6','shell.v10.7')
      .replaceAll('APP_VERSION=1006','APP_VERSION=1007')
      .replaceAll('APP_RELEASE="10.6"','APP_RELEASE="10.7"')
      .replaceAll('V10.6','V10.7')
      .replaceAll('Version 10.6','Version 10.7');

    const oldFake=`        function fakeGroupHeadingV106(entry){
          if(!entry)return false;
          return !clean(entry.quantity,80)&&NON_ARTICLE_HEADINGS_V106.has(normalize(entry.name));
        }`;

    const newFake=`        function normalizedGroupHeadingV107(value){
          return normalize(String(value||'')
            .replace(/[*_#]+/g,' ')
            .replace(/[\\/&+]+/g,' et ')
            .replace(/[()[\\]{}]/g,' ')
            .replace(/[:：;,.!?]+$/g,' ')
            .replace(/\\s+/g,' '));
        }

        function fakeGroupHeadingV106(entry){
          if(!entry)return false;
          const heading=normalizedGroupHeadingV107(entry.name);
          return NON_ARTICLE_HEADINGS_V106.has(heading)||
            /^viandes?\\s+(?:et\\s+)?poissons?$/.test(heading);
        }`;

    source=source
      .replace(oldFake,newFake)
      .replace('const cleanedHeading=normalize(','const cleanedHeading=normalizedGroupHeadingV107(')
      .replace(
        'if(NON_ARTICLE_HEADINGS_V106.has(cleanedHeading)){',
        'if(NON_ARTICLE_HEADINGS_V106.has(cleanedHeading)||/^viandes?\\s+(?:et\\s+)?poissons?$/.test(cleanedHeading)){'
      );

    document.open();
    document.write(source);
    document.close();
  })();
  </script>
</body>
</html>
